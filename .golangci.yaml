# yaml-language-server: $schema=https://raw.githubusercontent.com/golangci/golangci-lint/refs/heads/main/jsonschema/golangci.next.jsonschema.json

version: "2"

run:
  relative-path-mode: gitroot
  issues-exit-code: 1
  tests: true
  allow-parallel-runners: true
  go: "1.27"

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
      colors: true
  show-stats: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: false

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    gofmt:
      simplify: true
      rewrite-rules:
        - pattern: "interface{}"
          replacement: "any"
    gofumpt:
      module-path: github.com/zchee/mcp-lsp
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/zchee/mcp-lsp
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - cyclop
    - decorder
    - dogsled
    - dupword
    - durationcheck
    - errchkjson
    - errname
    - errorlint
    - funlen
    - ginkgolinter
    - gocheckcompilerdirectives
    - gocognit
    - gocritic
    - gocyclo
    - godot
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - importas
    - inamedparam
    - ineffassign
    - intrange
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - revive
    - sloglint
    - spancheck
    # - staticcheck # TODO(zchee): enable after 1.27
    - tagalign
    - tagliatelle
    - testableexamples
    - thelper
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - varnamelen
    - wastedassign

  settings:
    asasalint:
      use-builtin-exclusions: true
    cyclop:
      max-complexity: 16
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    funlen:
      lines: 120
      statements: 60
    gocognit:
      min-complexity: 30
    gocritic:
      disabled-checks:
        - commentedOutCode
        - deprecatedComment
        - whyNoLint
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      settings:
        hugeParam:
          sizeThreshold: 80
        rangeExprCopy:
          sizeThreshold: 512
        rangeValCopy:
          sizeThreshold: 128
    gocyclo:
      min-complexity: 30
    godot:
      scope: declarations
      capital: false
    govet:
      disable:
        - fieldalignment
      enable-all: true
    importas:
      no-unaliased: true
      alias:
        - pkg: github.com/google/go-cmp/cmp
          alias: gocmp
    lll:
      line-length: 200
      tab-width: 1
    maintidx:
      under: 15
    misspell:
      locale: US
      ignore-rules:
        - cancelled
        - cancelling
    nakedret:
      max-func-lines: 30
    nestif:
      min-complexity: 4
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    testpackage:
      skip-regexp: .*(export)_test\.go
    unparam:
      check-exported: true
    varnamelen:
      max-distance: 5
      min-name-length: 1
      check-receiver: true
      check-return: true
      ignore-type-assert-ok: false
      ignore-map-index-ok: false
      ignore-chan-recv-ok: false
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
      - internal/genlsp
    rules:
      - linters:
          - cyclop
          - errcheck
          - funlen
          - gocognit
          - goconst
          - gocyclo
          - gosec
          - lll
          - maintidx
          - nilnil
          - wrapcheck
        path: (.+)_test\.go

      - linters:
          - gocritic
        path: (.*)?_example_test.go

      - linters:
          - govet
        text: "shadow: declaration of \"err|ok|ctx\""
